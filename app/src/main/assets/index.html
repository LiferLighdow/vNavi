<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>vNavi Home</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #0A84FF;
            --text: #ffffff;
            --danger: #FF453A;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-user-select: none; /* 讓首頁無法選取文字 */
            user-select: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px 16px;
            width: 100%;
            max-width: 450px;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .icon-box {
            width: 64px;
            height: 64px;
            background-color: var(--card);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            overflow: hidden;
            border: 0.5px solid #2c2c2e;
            transition: transform 0.1s;
        }

        .item:active .icon-box { transform: scale(0.92); }

        .icon-box img { width: 32px; height: 32px; object-fit: contain; }

        .label {
            font-size: 11px;
            opacity: 0.7;
            text-align: center;
            max-width: 64px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Modal Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .modal {
            background: var(--card);
            width: 85%;
            max-width: 320px;
            border-radius: 20px;
            padding: 24px;
            border: 0.5px solid #3a3a3c;
        }

        input {
            width: 100%;
            background: #2c2c2e;
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: white;
            margin-bottom: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .modal-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-save { background: var(--accent); color: white; }
        .btn-cancel { background: #3a3a3c; color: white; }
        .btn-delete { background: var(--danger); color: white; margin-top: 10px; }

        .add-icon { font-size: 32px; color: var(--accent); }
    </style>
</head>
<body>

    <div class="grid" id="grid"></div>

    <div class="overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle" style="margin-top:0; font-size:18px;">Add Site</h3>
            <input type="text" id="siteName" placeholder="Name">
            <input type="text" id="siteUrl" placeholder="URL">
            <div class="modal-btns">
                <div class="btn btn-cancel" onclick="closeModal()">Cancel</div>
                <div class="btn btn-save" onclick="saveSite()">Save</div>
            </div>
            <div id="deleteBtn" class="btn btn-delete" style="display:none;" onclick="deleteCurrentSite()">Delete</div>
        </div>
    </div>

    <script>
        let sites = [];
        let editingIndex = -1;

        function loadSites() {
            // 從 Android SharedPreferences 讀取
            try {
                sites = JSON.parse(Android.getFavorites());
            } catch(e) {
                sites = [{ name: 'Google', url: 'https://google.com' }];
            }
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            sites.forEach((s, i) => {
                const domain = new URL(s.url).hostname;
                const div = document.createElement('div');
                div.className = 'item';
                div.onclick = () => window.location.href = s.url;
                div.oncontextmenu = (e) => { e.preventDefault(); openModal(i); };
                div.innerHTML = `
                    <div class="icon-box">
                        <img src="https://www.google.com/s2/favicons?sz=128&domain=${domain}"
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22 fill=%22white%22>${s.name[0]}</text></svg>'">
                    </div>
                    <div class="label">${s.name}</div>
                `;
                grid.appendChild(div);
            });

            const add = document.createElement('div');
            add.className = 'item';
            add.onclick = () => openModal(-1);
            add.innerHTML = '<div class="icon-box"><span class="add-icon">+</span></div><div class="label">Add</div>';
            grid.appendChild(add);
        }

        function openModal(index) {
            editingIndex = index;
            const overlay = document.getElementById('modalOverlay');
            if (index === -1) {
                document.getElementById('siteName').value = "";
                document.getElementById('siteUrl').value = "";
                document.getElementById('deleteBtn').style.display = 'none';
            } else {
                document.getElementById('siteName').value = sites[index].name;
                document.getElementById('siteUrl').value = sites[index].url;
                document.getElementById('deleteBtn').style.display = 'block';
            }
            overlay.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        function saveSite() {
            const name = document.getElementById('siteName').value;
            let url = document.getElementById('siteUrl').value;
            if (!name || !url) return;
            if (!url.startsWith('http')) url = 'https://' + url;

            if (editingIndex === -1) sites.push({ name, url });
            else sites[editingIndex] = { name, url };

            saveAndRefresh();
        }

        function deleteCurrentSite() {
            if (editingIndex > -1) {
                sites.splice(editingIndex, 1);
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            Android.saveFavorites(JSON.stringify(sites));
            closeModal();
            render();
        }

        window.onload = loadSites;
    </script>
</body>
</html>
